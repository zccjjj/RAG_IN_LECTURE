<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频问答工具 - RAG教学助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>视频问答工具</h1>
            <p class="subtitle">上传教学视频，智能回答您的问题</p>
        </header>

        <!-- 上传区域 -->
        <section id="upload-section" class="card">
            <h2>上传视频和问题</h2>
            <form id="upload-form">
                <div class="form-group">
                    <label for="video-input">选择视频文件</label>
                    <div class="file-drop-zone" id="drop-zone">
                        <input type="file" id="video-input" name="video"
                               accept=".mp4,.avi,.mkv,.mov,.webm" required>
                        <p class="drop-text">拖拽视频文件到此处，或点击选择</p>
                        <p class="file-info" id="file-info">支持格式: MP4, AVI, MKV, MOV, WebM</p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="questions-input">问题列表（每行一个问题）</label>
                    <textarea id="questions-input" name="questions" rows="6"
                              placeholder="请输入问题，每行一个。例如：&#10;这段视频的主要内容是什么？&#10;视频中提到了哪些关键概念？&#10;请总结视频中的核心论点。"
                              required></textarea>
                </div>

                <div class="form-group">
                    <label for="language-select">视频语言（用于语音识别）</label>
                    <select id="language-select" name="language">
                        <option value="">自动检测</option>
                        <option value="zh">中文</option>
                        <option value="en">英文</option>
                        <option value="ja">日文</option>
                        <option value="ko">韩文</option>
                        <option value="fr">法文</option>
                        <option value="de">德文</option>
                        <option value="es">西班牙文</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" id="submit-btn">
                    开始处理
                </button>
            </form>
        </section>

        <!-- 进度区域 -->
        <section id="progress-section" class="card" style="display: none;">
            <h2>处理进度</h2>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-info">
                    <span id="progress-text">准备中...</span>
                    <span id="progress-percent">0%</span>
                </div>
            </div>
            <div class="stage-info" id="stage-info">
                <div class="spinner"></div>
                <span id="stage-text">等待处理...</span>
            </div>
        </section>

        <!-- 结果区域 -->
        <section id="results-section" class="card" style="display: none;">
            <h2>问答结果</h2>
            <div id="results-container"></div>
            <div class="actions">
                <button class="btn-primary" id="download-btn">下载文档</button>
                <button class="btn-secondary" id="new-btn">开始新任务</button>
            </div>
        </section>

        <!-- 错误区域 -->
        <section id="error-section" class="card error-card" style="display: none;">
            <h2>处理出错</h2>
            <p id="error-message"></p>
            <button class="btn-secondary" id="retry-btn">重新开始</button>
        </section>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
